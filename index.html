<html>
<head>
<title>Medicine Store</title>

<style>

/* Page Design */
body{
    font-family: Arial;
    background-color: #f2f2f2;
    background-repeat: no-repeat;
    background-size: cover;
    background-image: url('https://image.slidesdocs.com/responsive-images/background/dna-geometric-medical-treatment-gradient-blue-medical-powerpoint-background_4fe8a31e39__960_540.jpg');
}
h1{
    text-align:center;
    color:green;
}

/* Table Design */
table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
    background:white;
}

/* Table Border */
table, th, td{
    border:1px solid black;
}

/* Cell Padding */
th
{
    background-color: green;
    padding: 10px;
    text-align:center;
}
th,td{
    padding: 10px;
    text-align:center;
}
tr{
    transition: 0.2s;
}
tr:hover
{
    transform: scale(1.1) ;
}
 

/* Header Color */
th{
    background-color:rgb(26, 202, 26);
    color:white;
    
}

/* Button Style */
.button{
    padding:5px 10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>💊 Medicine Store</h1>
<hr>
<br><br>

<table>

<tr>
<th>Medicine Name</th>
<th>Price (₹)</th>
<th>Quantity</th>
<th>Buy</th>
</tr>

<tr>
<td>Paracetamol</td>
<td>20</td>
<td>10</td>
<td><button onclick="buy()">Buy</button></td>
</tr>

<tr>
<td>Crocin</td>
<td>30</td>
<td>15</td>
<td><button onclick="buy()">Buy</button></td>
</tr>

<tr>
<td>Disprin</td>
<td>25</td>
<td>8</td>
<td><button onclick="buy()">Buy</button></td>
</tr>

<tr>
    <td>cetirizine</td>
    <td>20</td>
    <td>5</td>
    <td><button onclick="buy()">Buy</button></td>
</tr>

<tr>
    <td>benadryl</td>
    <td>30</td>
    <td>40</td>
    <td><button onclick="buy()">Buy</button></td>
</tr>

<tr>
    <td>ORS</td>
    <td>20</td>
    <td>10</td>
    <td><button onclick="buy()">Buy</button></td>
</tr>

</table>

<script>
function buy(){
    alert("Medicine Added Successfully!");
}
</script>

</body>
</html>
